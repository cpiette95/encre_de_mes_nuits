<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4ead5"/>
      <stop offset="100%" stop-color="#e8dcc0"/>
    </linearGradient>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="3"/><feColorMatrix values="0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.1 0"/></filter>
  </defs>
  <rect width="600" height="600" fill="url(#bg)"/>
  <rect width="600" height="600" filter="url(#grain)" opacity="0.5"/>
  <rect x="60" y="60" width="480" height="480" fill="none" stroke="#c9b896" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="300" y="295" font-family="'Courier New', monospace" font-size="20" fill="#5a4d3a" text-anchor="middle" opacity="0.7">image goes here</text>
  <text x="300" y="325" font-family="'Courier New', monospace" font-size="14" fill="#5a4d3a" text-anchor="middle" opacity="0.5">replace in /images folder</text>
</svg>
